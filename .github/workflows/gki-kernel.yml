name: GKI Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      make_release:
        required: true
        type: boolean
        default: true
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      custom_sublevel:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      revision:
        required: false
        type: string
        default: ""
      use_zram:
        required: true
        type: boolean
        default: true
      use_kpm:
        required: true
        type: boolean
        default: true
      supp_op:
        required: true
        type: boolean
        default: false
      BBG:
        required: true
        type: boolean
        default: false
      set_defbbr:
        required: false
        type: boolean
        default: false

jobs:
  build-kernel-kernelsu-susfs:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Maximize Build Space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true
          remove-large-packages: true
          remove-swapfile: true
          remove-cached-tools: false
          verbose: true

      - name: 设置环境变量
        run: |
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.custom_sublevel }}"
          FINAL_NAME="kernel-${{ inputs.kernel_version }}.${{ inputs.custom_sublevel }}"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV
          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV

      - name: 安装依赖
        run: sudo apt update && sudo apt upgrade -y && sudo apt install -y ccache python3 git curl

      - name: 配置 ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: 还原 ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.custom_sublevel }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.custom_sublevel }}-ccache-

      - name: 缓存工具链
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            kernel-build-tools
            mkbootimg
          key: toolchain-${{ runner.os }}-v1

      - name: 下载工具链
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone https://android.googlesource.com/kernel/prebuilts/build-tools -b main-kernel-build-2024 --depth 1 kernel-build-tools
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg -b main-kernel-build-2024 --depth 1 mkbootimg

      - name: 设置工具路径
        run: |
          echo "AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool" >> $GITHUB_ENV
          echo "MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py" >> $GITHUB_ENV
          echo "UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py" >> $GITHUB_ENV

      - name: 生成签名密钥
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 > ./kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
          echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem" >> $GITHUB_ENV

      - name: 安装 repo
        run: |
          mkdir -p ./git-repo
          curl https://storage.googleapis.com/git-repo-downloads/repo > ./git-repo/repo
          chmod a+rx ./git-repo/repo
          echo "REPO=$GITHUB_WORKSPACE/./git-repo/repo" >> $GITHUB_ENV

      - name: 克隆依赖
        run: |
          git clone https://github.com/WildPlusKernel/AnyKernel3.git -b gki-2.0
          git clone https://github.com/ShirkNeko/susfs4ksu.git -b gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}
          git clone https://github.com/Tools-cx-app/kernel_patches.git
          git clone https://github.com/ShirkNeko/SukiSU_patch.git

      - name: 初始化并同步真实 GKI 源码
        run: |
          mkdir -p "$CONFIG"
          cd "$CONFIG"
          $REPO init -u https://android.googlesource.com/kernel/manifest -b common-${{ inputs.android_version }}-${{ inputs.kernel_version }} --depth=1 --repo-rev=v2.16
          $REPO sync -c -j$(nproc --all) --no-tags --fail-fast

      - name: 强制修改内核版本号为自定义值
        run: |
          cd "$CONFIG/common"
          sed -i "/^EXTRAVERSION/c\EXTRAVERSION = .${{ inputs.custom_sublevel }}" Makefile
          echo "" > scripts/setlocalversion
          cat > scripts/mkcompile_h <<'EOF'
          #!/bin/sh
          UTS_VERSION="#1"
          echo "$UTS_VERSION"
          EOF
          chmod +x scripts/mkcompile_h
          echo 'CONFIG_LOCALVERSION=""' >> arch/arm64/configs/gki_defconfig

      - name: 一加8E支持
        if: ${{ inputs.supp_op }}
        run: |
          cd "$CONFIG/common/drivers/"
          curl -LSs "https://github.com/zzh20188/GKI_KernelSU_SUSFS/raw/refs/heads/dev/hmbird_patch.c" -o hmbird_patch.c
          echo "obj-y += hmbird_patch.o" >> Makefile

      - name: 确定 KernelSU 分支
        run: |
          case "${{ inputs.kernelsu_branch }}" in
            "Stable(标准)") echo "BRANCH=-s susfs-main" >> $GITHUB_ENV ;;
            "Dev(开发)")
              case "${{ inputs.kernelsu_variant }}" in
                "Official"|"MKSU") echo "BRANCH=-s main" >> $GITHUB_ENV ;;
                "Next") echo "BRANCH=-s next-susfs-dev" >> $GITHUB_ENV ;;
                "SukiSU") echo "BRANCH=-s susfs-test" >> $GITHUB_ENV ;;
              esac ;;
          esac

      - name: 添加 KernelSU
        run: |
          cd "$CONFIG"
          if [ "${{ inputs.kernelsu_variant }}" == "Official" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash $BRANCH
          elif [ "${{ inputs.kernelsu_variant }}" == "Next" ]; then
            curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next-susfs/kernel/setup.sh" | bash $BRANCH
          elif [ "${{ inputs.kernelsu_variant }}" == "MKSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/5ec1cff/KernelSU/main/kernel/setup.sh" | bash $BRANCH
          elif [ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash $BRANCH
          fi

      - name: Baseband-guard
        if: ${{ inputs.BBG }}
        run: |
          cd "$CONFIG/common"
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig

      - name: SUSFS补丁
        run: |
          cd "$CONFIG"
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
          cp -r ../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cd common
          patch -p1 --fuzz=3 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true
          if [ "${{ inputs.kernelsu_variant }}" == "Official" ] || [ "${{ inputs.kernelsu_variant }}" == "MKSU" ]; then
            cd ../KernelSU
            cp ../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch || true
          elif [ "${{ inputs.kernelsu_variant }}" == "Next" ]; then
            cd ../KernelSU-Next
            sed -i '/bool ksu_devpts_hook = false;/d' kernel/sucompat.c
          fi

      - name: LZ4KD补丁
        if: ${{ inputs.use_zram }}
        run: |
          cd "$CONFIG/common"
          cp -r ../../SukiSU_patch/other/zram/lz4k/include/linux/* include/linux/
          cp -r ../../SukiSU_patch/other/zram/lz4k/lib/* lib/
          cp -r ../../SukiSU_patch/other/zram/lz4k/crypto/* crypto/
          cp -r ../../SukiSU_patch/other/zram/lz4k_oplus lib/
          cp ../../SukiSU_patch/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4kd.patch ./
          cp ../../SukiSU_patch/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4k_oplus.patch ./
          patch -p1 -F 3 < lz4kd.patch || true
          patch -p1 -F 3 < lz4k_oplus.patch || true

      - name: 隐藏补丁
        run: |
          cd "$CONFIG/common"
          if [ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]; then
            cp ../../SukiSU_patch/69_hide_stuff.patch ./
          else
            cp ../../kernel_patches/69_hide_stuff.patch ./
          fi
          patch -p1 -F 3 < 69_hide_stuff.patch

      - name: LZ4KD配置
        if: ${{ inputs.use_zram }}
        run: |
          FILE="$CONFIG/common/arch/arm64/configs/gki_defconfig"
          echo "CONFIG_ZSMALLOC=y" >> $FILE
          echo "CONFIG_ZRAM=y" >> $FILE
          echo "CONFIG_CRYPTO_LZ4HC=y" >> $FILE
          echo "CONFIG_CRYPTO_LZ4K=y" >> $FILE
          echo "CONFIG_CRYPTO_LZ4KD=y" >> $FILE
          echo "CONFIG_CRYPTO_LZ4K_OPLUS=y" >> $FILE
          echo "CONFIG_ZRAM_WRITEBACK=y" >> $FILE
          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
            echo "CONFIG_ZRAM_DEF_COMP_LZ4KD=y" >> $FILE
          fi

      - name: BBR默认
        if: ${{ inputs.set_defbbr }}
        run: echo "CONFIG_DEFAULT_BBR=y" >> "$CONFIG/common/arch/arm64/configs/gki_defconfig"

      - name: SUSFS配置
        run: |
          cd "$CONFIG/common/arch/arm64/configs"
          echo "CONFIG_KSU=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> gki_defconfig
          [ "${{ inputs.kernel_version }}" != "6.6" ] && echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> gki_defconfig || echo "CONFIG_KSU_SUSFS_SUS_PATH=n" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> gki_defconfig
          echo "CONFIG_TMPFS_XATTR=y" >> gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> gki_defconfig
          sed -i 's/check_defconfig//' ../../build.config.gki

      - name: 编译内核
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 40
          max_attempts: 3
          command: |
            cd "$CONFIG"
            sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' common/build.config.gki.aarch64
            if [ -f build/build.sh ]; then
              LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="ccache clang"
            else
              tools/bazel build --config=fast --lto=thin //common:kernel_aarch64_dist
            fi

      - name: KPM修补 Image
        if: ${{ inputs.use_kpm && inputs.kernelsu_variant == 'SukiSU' }}
        run: |
          cd "$CONFIG"/$(find . -name "Image" | head -1 | xargs dirname)
          curl -LSs https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/main/kpm/patch_linux -o patch
          chmod +x patch
          ./patch
          rm -f Image
          mv oImage Image

      - name: 打包 AnyKernel3
        run: |
          mkdir -p bootimgs
          cp "$CONFIG"/$(find . -name "Image*" | head -3) . || true
          gzip -9 Image
          cd AnyKernel3
          for img in ../Image ../Image.lz4 ../Image.gz; do
            [ -f "$img" ] || continue
            cp "$img" .
            zip -r9 "../${{ env.FINAL_NAME }}-AnyKernel3${img##*.}.zip" *
            rm -f Image*
          done

      - name: 生成 boot.img
        run: |
          cd bootimgs
          gzip -9 ../Image
          for k in ../Image ../Image.gz ../Image.lz4; do
            [ -f "$k" ] || continue
            $MKBOOTIMG --header_version 4 --kernel "$k" --output "${{ env.FINAL_NAME }}-boot${k##*.}.img"
            $AVBTOOL add_hash_footer --image "${{ env.FINAL_NAME }}-boot${k##*.}.img" --partition_name boot --partition_size $((64*1024*1024)) --algorithm SHA256_RSA2048 --key "$BOOT_SIGN_KEY_PATH"
          done
          mv *.img ../

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernelsu_variant }}-${{ env.FINAL_NAME }}
          path: |
            *.zip
            *.img
