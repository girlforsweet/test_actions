name: GKI Kernel Build
permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      use_zram:
        required: true
        type: boolean
        default: true
      use_kpm:
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt update && sudo apt install -y ccache python3 git curl unzip zip

      - run: |
          ccache --zero-stats
          ccache --show-stats

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-${{ github.sha }}
          restore-keys: ccache-${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-

      - id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            kernel-build-tools
            mkbootimg
          key: toolchain-v1

      - if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b main-kernel-build-2024 \
            https://android.googlesource.com/kernel/prebuilts/build-tools kernel-build-tools
          git clone --depth 1 -b main-kernel-build-2024 \
            https://android.googlesource.com/platform/system/tools/mkbootimg mkbootimg

      - run: |
          echo "AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool" >> $GITHUB_ENV
          echo "MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py" >> $GITHUB_ENV
          echo "UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py" >> $GITHUB_ENV

      - run: |
          mkdir -p git-repo
          curl -L https://storage.googleapis.com/git-repo-downloads/repo > git-repo/repo
          chmod +x git-repo/repo
          echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> $GITHUB_ENV

      - run: |
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV
          mkdir -p "$CONFIG"
          cd "$CONFIG"
          BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          $REPO init -u https://android.googlesource.com/kernel/manifest -b common-$BRANCH --depth=1 --repo-rev=v2.16
          if git ls-remote --exit-code https://android.googlesource.com/kernel/common $BRANCH | grep -q deprecated; then
            sed -i "s/\"$BRANCH\"/\"deprecated\/$BRANCH\"/g" .repo/manifests/default.xml
          fi
          $REPO sync -c -j$(nproc) --no-tags

      - run: |
          cd "$CONFIG"
          case "${{ inputs.kernelsu_branch }}" in
            "Stable(standard)")   BRANCH="-s susfs-main" ;;
            "Dev(development)")
              case "${{ inputs.kernelsu_variant }}" in
                "Official"|"MKSU") BRANCH="-s main" ;;
                "Next")            BRANCH="-s next-susfs-dev" ;;
                "SukiSU")          BRANCH="-s susfs-test" ;;
                *) exit 1 ;;
              esac ;;
            *) exit 1 ;;
          esac
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - run: |
          cd "$CONFIG"
          if [ "${{ inputs.kernelsu_variant }}" = "Official" ]; then
            curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash $BRANCH
          elif [ "${{ inputs.kernelsu_variant }}" = "Next" ]; then
            curl -LSs https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next-susfs/kernel/setup.sh | bash $BRANCH
          elif [ "${{ inputs.kernelsu_variant }}" = "MKSU" ]; then
            curl -LSs https://raw.githubusercontent.com/5ec1cff/KernelSU/main/kernel/setup.sh | bash $BRANCH
          elif [ "${{ inputs.kernelsu_variant }}" = "SukiSU" ]; then
            curl -LSs https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash $BRANCH
          fi

      - run: |
          git clone --depth 1 -b gki-2.0 https://github.com/WildPlusKernel/AnyKernel3.git
          git clone --depth 1 -b gki-${{ inputs.android_version }}-${{ inputs.kernel_version }} \
            https://github.com/ShirkNeko/susfs4ksu.git
          git clone --depth 1 https://github.com/Tools-cx-app/kernel_patches.git
          git clone --depth 1 https://github.com/ShirkNeko/SukiSU_patch.git

      - run: |
          cd "$CONFIG"
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
          cp -r ../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cd common
          patch -p1 --fuzz=3 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

      - if: ${{ inputs.use_zram }}
        run: |
          cd "$CONFIG/common"
          cp -r ../../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../../SukiSU_patch/other/zram/lz4k/lib/* ./lib/
          cp -r ../../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto/
          cp -r ../../SukiSU_patch/other/zram/lz4k_oplus ./lib/
          patch -p1 -F 3 < ../../SukiSU_patch/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4kd.patch || true
          patch -p1 -F 3 < ../../SukiSU_patch/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4k_oplus.patch || true

      - run: |
          cd "$CONFIG/common"
          if [ "${{ inputs.kernelsu_variant }}" = "SukiSU" ]; then
            patch -p1 -F 3 < ../../SukiSU_patch/69_hide_stuff.patch
          else
            patch -p1 -F 3 < ../../kernel_patches/69_hide_stuff.patch
          fi

      - run: |
          cd "$CONFIG"
          echo "CONFIG_KSU=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> common/arch/arm64/configs/gki_defconfig
          if [ "${{ inputs.kernel_version }}" != "6.6" ]; then
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> common/arch/arm64/configs/gki_defconfig
          fi
          sed -i 's/check_defconfig//' common/build.config.gki

      - run: |
          cd "$CONFIG"
          sed -i '/^CONFIG_LOCALVERSION=/c\CONFIG_LOCALVERSION=""' common/arch/arm64/configs/gki_defconfig
          if [ -n "${{ inputs.version }}" ]; then
            echo 'echo "${{ inputs.version }}"' > common/scripts/setlocalversion
          else
            cat > common/scripts/setlocalversion <<'EOF'
#!/bin/bash
res=$(git rev-parse --short HEAD 2>/dev/null || echo "")
[ -n "$res" ] && res="+g$res"
echo "$res"
EOF
          fi
          chmod +x common/scripts/setlocalversion
          if [ ! -f build/build.sh ]; then
            sed -i '/stable_scmversion_cmd/d' build/kernel/kleaf/impl/stamp.bzl || true
          fi
          CURRENT_TIME=$(date -u +"%a %b %d %H:%M:%S UTC %Y")
          perl -pi -e "s{UTS_VERSION=\".*\"}{UTS_VERSION=\"#1 SMP PREEMPT $CURRENT_TIME\"}" common/scripts/mkcompile_h

      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: |
            cd "$CONFIG"
            sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' common/build.config.gki.aarch64
            if [ -f build/build.sh ]; then
              LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="ccache clang"
            else
              tools/bazel build --disk_cache=$HOME/.cache/bazel --config=fast --lto=thin //common:kernel_aarch64_dist
            fi
            ccache --show-stats

      - if: ${{ inputs.use_kpm && inputs.kernelsu_variant == 'SukiSU' }}
        run: |
          if [ "${{ inputs.kernel_version }}" != "6.6" ]; then
            cd "$CONFIG/$( [ -d out ] && echo out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist || echo bazel-bin/common/kernel_aarch64 )"
            curl -LSs https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/main/kpm/patch_linux -o patch
            chmod +x patch
            ./patch
            mv oImage Image
          fi

      - run: |
          mkdir -p bootimgs
          SRC=$( [ -d "$CONFIG/out" ] && echo "$CONFIG/out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist" || echo "$CONFIG/bazel-bin/common/kernel_aarch64" )
          cp $SRC/Image $SRC/Image.lz4 bootimgs/
          cp $SRC/Image ./
          cp $SRC/Image.lz4 ./
          gzip -9k Image

      - run: |
          cd AnyKernel3
          BASE="${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}"
          mv ../Image . && zip -r9 "../${BASE}-AnyKernel3.zip" ./* && rm Image
          mv ../Image.lz4 . && zip -r9 "../${BASE}-AnyKernel3-lz4.zip" ./* && rm Image.lz4
          mv ../Image.gz . && zip -r9 "../${BASE}-AnyKernel3-gz.zip" ./* && rm Image.gz

      - if: ${{ inputs.android_version == 'android12' }}
        run: |
          cd bootimgs
          curl -L "https://dl.google.com/android/gki/gki-certified-boot-android12-5.10-${{ inputs.os_patch_level }}_${{ inputs.revision }}.zip" -o gki.zip || \
            curl -L https://dl.google.com/android/gki/gki-certified-boot-android12-5.10-2023-01_r1.zip -o gki.zip
          unzip -o gki.zip && rm gki.zip
          $UNPACK_BOOTIMG --boot_img boot-5.10.img
          gzip -9k Image
          $MKBOOTIMG --header_version 4 --kernel Image --ramdisk out/ramdisk --os_version 12.0.0 --os_patch_level ${{ inputs.os_patch_level }} --output boot.img
          $AVBTOOL add_hash_footer --image boot.img --partition_name boot --partition_size $((64*1024*1024)) --algorithm SHA256_RSA2048 --key $GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
          cp boot.img ../${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot.img
          # gz & lz4 同理，略

      - if: ${{ contains('android13 android14 android15', inputs.android_version) }}
        run: |
          cd bootimgs
          gzip -9k Image
          for fmt in "" .gz .lz4; do
            $MKBOOTIMG --header_version 4 --kernel Image$fmt --output boot$fmt.img
            $AVBTOOL add_hash_footer --image boot$fmt.img --partition_name boot --partition_size $((64*1024*1024)) --algorithm SHA256_RSA2048 --key $GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
            cp boot$fmt.img ../${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot$fmt.img
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernelsu_variant }}-kernel-${{ env.CONFIG }}
          path: |
            *.zip
            *.img
