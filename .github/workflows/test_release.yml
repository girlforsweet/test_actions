name: Test Release

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: true
      kernels_to_build:
        description: |
          Comma-separated list of kernels to build/release, e.g.:
          a12-5.10,a13-5.10,a13-5.15,a14-5.15,a14-6.1,a15-6.6
          or "all" to build every kernel.
        required: true
        type: string
        default: 'a15-6.6'
      kernelsu_variant:
        description: "Select KernelSU"
        required: true
        type: choice
        options:
        - Official
        - Next
        - MKSU
        - SukiSU
        default: SukiSU
      kernelsu_branch:
        description: "Select KSU branch"
        required: true
        type: choice
        options:
        - Stable(标准)
        - Dev(开发)
        - Other(其他/指定)
        default: Stable(标准)
      custom_sublevel:
        description: '自定义内核 sublevel（例如输入 520 则所有内核版本显示为 x.x.520）'
        required: true
        type: string
        default: '999'
      use_zram:
        description: 'Enable more ZRAM algorithms?'
        required: true
        type: boolean
        default: true
      use_kpm:
        description: 'Enable KPM functionality?'
        required: true
        type: boolean
        default: true
      BBG:
        description: "是否启用内核层面阻止对关键分区/设备节点的非法写入(LSM)？"
        required: true
        type: boolean
        default: true
      get_manager:
        description: 'Get the latest KSU Manager at the same time?'
        required: true
        type: boolean
        default: false

jobs:
  get_manager:
    if: ${{ inputs.get_manager }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}

  build-kernel-a12-5-10:
    if: contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a12-5.10')
    uses: ./.github/workflows/kernel-a12-5.10.yml
    secrets: inherit
    with:
      make_release: ${{ inputs.make_release }}
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      custom_sublevel: ${{ inputs.custom_sublevel }}
      use_zram: ${{ inputs.use_zram }}
      use_kpm: ${{ inputs.use_kpm }}
      BBG: ${{ inputs.BBG }}

  build-kernel-a13-5-10:
    if: contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a13-5.10')
    uses: ./.github/workflows/kernel-a13-5.10.yml
    secrets: inherit
    with:
      make_release: ${{ inputs.make_release }}
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      custom_sublevel: ${{ inputs.custom_sublevel }}
      use_zram: ${{ inputs.use_zram }}
      use_kpm: ${{ inputs.use_kpm }}
      BBG: ${{ inputs.BBG }}

  build-kernel-a13-5-15:
    if: contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a13-5.15')
    uses: ./.github/workflows/kernel-a13-5.15.yml
    secrets: inherit
    with:
      make_release: ${{ inputs.make_release }}
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      custom_sublevel: ${{ inputs.custom_sublevel }}
      use_zram: ${{ inputs.use_zram }}
      use_kpm: ${{ inputs.use_kpm }}
      BBG: ${{ inputs.BBG }}

  build-kernel-a14-5-15:
    if: contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a14-5.15')
    uses: ./.github/workflows/kernel-a14-5.15.yml
    secrets: inherit
    with:
      make_release: ${{ inputs.make_release }}
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      custom_sublevel: ${{ inputs.custom_sublevel }}
      use_zram: ${{ inputs.use_zram }}
      use_kpm: ${{ inputs.use_kpm }}
      BBG: ${{ inputs.BBG }}

  build-kernel-a14-6-1:
    if: contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a14-6.1')
    uses: ./.github/workflows/kernel-a14-6.1.yml
    secrets: inherit
    with:
      make_release: ${{ inputs.make_release }}
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      custom_sublevel: ${{ inputs.custom_sublevel }}
      use_zram: ${{ inputs.use_zram }}
      use_kpm: ${{ inputs.use_kpm }}
      BBG: ${{ inputs.BBG }}

  build-kernel-a15-6-6:
    if: contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a15-6.6')
    uses: ./.github/workflows/kernel-a15-6.6.yml
    secrets: inherit
    with:
      make_release: ${{ inputs.make_release }}
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      custom_sublevel: ${{ inputs.custom_sublevel }}
      use_zram: ${{ inputs.use_zram }}
      use_kpm: ${{ inputs.use_kpm }}
      BBG: ${{ inputs.BBG }}

  check-build-status:
    runs-on: ubuntu-latest
    needs:
      - get_manager
      - build-kernel-a12-5-10
      - build-kernel-a13-5-10
      - build-kernel-a13-5-15
      - build-kernel-a14-5-15
      - build-kernel-a14-6-1
      - build-kernel-a15-6-6
    if: always()
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    env:
      SHOULD_RUN_A12_5_10: ${{ contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a12-5.10') }}
      SHOULD_RUN_A13_5_10: ${{ contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a13-5.10') }}
      SHOULD_RUN_A13_5_15: ${{ contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a13-5.15') }}
      SHOULD_RUN_A14_5_15: ${{ contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a14-5.15') }}
      SHOULD_RUN_A14_6_1: ${{ contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a14-6.1') }}
      SHOULD_RUN_A15_6_6: ${{ contains(github.event.inputs.kernels_to_build, 'all') || contains(github.event.inputs.kernels_to_build, 'a15-6.6') }}
      RESULT_GET_MANAGER: ${{ needs.get_manager.result }}
      RESULT_A12_5_10: ${{ needs.build-kernel-a12-5-10.result }}
      RESULT_A13_5_10: ${{ needs.build-kernel-a13-5-10.result }}
      RESULT_A13_5_15: ${{ needs.build-kernel-a13-5-15.result }}
      RESULT_A14_5_15: ${{ needs.build-kernel-a14-5-15.result }}
      RESULT_A14_6_1: ${{ needs.build-kernel-a14-6-1.result }}
      RESULT_A15_6_6: ${{ needs.build-kernel-a15-6-6.result }}
    steps:
      - name: Determine if release should proceed
        id: check
        run: |
          SHOULD_PROCEED="true"
          ERROR_MESSAGE=""
          if [[ "${{ inputs.get_manager }}" == "true" ]] && [[ "$RESULT_GET_MANAGER" != "success" ]]; then
            SHOULD_PROCEED="false"
            ERROR_MESSAGE+="get_manager failed. "
          fi
          check_job() {
            if [[ "$1" == "true" ]] && [[ "$2" != "success" ]]; then
              SHOULD_PROCEED="false"
              ERROR_MESSAGE+="Job $3 failed. "
            fi
          }
          check_job "$SHOULD_RUN_A12_5_10" "$RESULT_A12_5_10" "a12-5.10"
          check_job "$SHOULD_RUN_A13_5_10" "$RESULT_A13_5_10" "a13-5.10"
          check_job "$SHOULD_RUN_A13_5_15" "$RESULT_A13_5_15" "a13-5.15"
          check_job "$SHOULD_RUN_A14_5_15" "$RESULT_A14_5_15" "a14-5.15"
          check_job "$SHOULD_RUN_A14_6_1" "$RESULT_A14_6_1" "a14-6.1"
          check_job "$SHOULD_RUN_A15_6_6" "$RESULT_A15_6_6" "a15-6.6"
          echo "should_release=$SHOULD_PROCEED" >> "$GITHUB_OUTPUT"
          if [[ "$SHOULD_PROCEED" == "false" ]]; then
            echo "::error::$ERROR_MESSAGE"
            exit 1
          fi

  trigger-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - check-build-status
      - get_manager
    if: always() && inputs.make_release && needs.check-build-status.outputs.should_release == 'true'
    env:
      REPO_OWNER: ShirkNeko
      REPO_NAME: GKI_KernelSU_SUSFS
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      INITIAL_RELEASE_NOTES: |
        This release includes **${{ inputs.kernelsu_variant == 'Next' && 'KernelSU-' || '' }}${{ inputs.kernelsu_variant }}**
        Features:
        -> ${{ inputs.kernelsu_variant == 'Next' && 'KernelSU-' || '' }}${{ inputs.kernelsu_variant }}-${{ inputs.kernelsu_branch }}
        -> SUSFS v1.5.12
        -> Manual Syscall Hooks for better hiding
        -> Magic Mount Support
        -> Simple hiding for LineageOS detection
        -> Futile hiding for jit-zygote-cache detection
        -> Wireguard Support
        -> BBR Support
        ${{ inputs.BBG && '-> BBG Support' || '' }}
        ${{ inputs.use_kpm && '-> KPM Support' || '' }}
        -> **LZ4KD&ONEPLUS_LZ4K** ${{ inputs.use_zram && 'supported' || 'not supported' }}
        <details>
        <summary>Notes:</summary>
        - In SUS SU Mode 2, it will show as disabled or incompatible, the reason is that non-kprobe hooks were used.
        - Flashing AK3 zip with Kernel Flasher may brick device, use HorizonKernelFlasher.
        </details>
        Modules:
        -> https://github.com/sidex15/ksu_module_susfs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install GitHub CLI
        run: type -p gh || (sudo apt update && sudo apt install -y gh)
      - name: Generate New Tag
        run: |
          BASE_VERSION="v1.5.12"
          EXISTING_TAGS=$(git ls-remote --tags https://github.com/$REPO_OWNER/$REPO_NAME.git | awk '{print $2}' | sed 's|refs/tags/||')
          MAX_REV=0
          for tag in $EXISTING_TAGS; do
            if [[ $tag =~ ^$BASE_VERSION-r([0-9]+)$ ]]; then
              (( ${BASH_REMATCH[1]} > MAX_REV )) && MAX_REV=${BASH_REMATCH[1]}
            fi
          done
          NEW_TAG="$BASE_VERSION-r$((MAX_REV + 1))"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
      - name: Set Release Name and KSU Version
        run: |
          if [ "${{ inputs.kernelsu_variant }}" = "Next" ]; then
            git clone https://github.com/KernelSU-Next/KernelSU-Next.git tmp && cd tmp
            VER=$((10000 + $(git rev-list --count HEAD) + 200))
            cd .. && rm -rf tmp
            echo "RELEASE_NAME=GKI Kernel: KernelSU-Next ($VER) & SUSFS v1.5.12" >> $GITHUB_ENV
          elif [ "${{ inputs.kernelsu_variant }}" = "SukiSU" ]; then
            git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git tmp && cd tmp
            VER=$((10000 + $(git rev-list --count HEAD) + 700))
            cd .. && rm -rf tmp
            echo "RELEASE_NAME=GKI Kernel: SukiSU ($VER) & SUSFS v1.5.12" >> $GITHUB_ENV
          else
            echo "RELEASE_NAME=GKI Kernel: ${{ inputs.kernelsu_variant }} & SUSFS v1.5.12" >> $GITHUB_ENV
          fi
      - name: Build Release Notes
        run: |
          NOTES="${{ env.INITIAL_RELEASE_NOTES }}"
          NOTES+="\n\nLTO: thin\n\n<details><summary>Commit Information</summary>\n"
          NOTES+="\nCommit hashes (SUSFS4KSU at build time):\n"
          declare -A MAP=( ["a12-5.10"]="gki-android12-5.10" ["a13-5.10"]="gki-android13-5.10" ["a13-5.15"]="gki-android13-5.15" ["a14-5.15"]="gki-android14-5.15" ["a14-6.1"]="gki-android14-6.1" ["a15-6.6"]="gki-android15-6.6" )
          IFS=',' read -ra K <<< "${{ inputs.kernels_to_build == 'all' && 'a12-5.10,a13-5.10,a13-5.15,a14-5.15,a14-6.1,a15-6.6' || inputs.kernels_to_build }}"
          for k in "${K[@]}"; do
            BR="${MAP[$k]}"
            HASH=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/$BR | cut -f1)
            NOTES+="\n- $k: [$HASH](https://gitlab.com/simonpunk/susfs4ksu/-/commit/$HASH)"
          done
          NOTES+="\n\n</details>"
          echo "FULL_NOTES<<EOF" >> $GITHUB_ENV
          echo "$NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare Assets
        run: |
          mkdir release-assets
          find artifacts -type f -exec mv {} release-assets/ \;
          cd release-assets
          sha256sum * > SHA256SUMS.txt
      - name: Create Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ env.FULL_NOTES }}
          prerelease: true
          token: ${{ secrets.MY_GITHUB_TOKEN }}
      - name: Upload Assets
        run: |
          for f in release-assets/*; do
            gh release upload ${{ env.NEW_TAG }} "$f"
          done
      - name: Telegram Notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: |
          curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d message_thread_id="$TELEGRAM_MESSAGE_THREAD_ID" \
            -d parse_mode="HTML" \
            -d text="New Release: <a href=\"https://github.com/ShirkNeko/GKI_KernelSU_SUSFS/releases/tag/${{ env.NEW_TAG }}\">${{ env.NEW_TAG }}</a>\n${{ env.FULL_NOTES }}"
